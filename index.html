<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주 오션스위츠 객실 예약현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f2; --surface: #ffffff; --border: #e8e5de;
  --border-strong: #ccc8be; --text-primary: #1a1a1a;
  --text-secondary: #6b6860; --text-muted: #a09d97;
  --header-bg: #1a1a1a; --header-text: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-primary); font-size: 13px; line-height: 1.5; padding: 24px 20px 48px; }
.page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.page-sub { font-size: 12px; color: var(--text-muted); font-weight: 300; margin-top: 2px; }
.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.month-nav { display: flex; align-items: center; border: 1px solid var(--border-strong); border-radius: 8px; overflow: hidden; background: var(--surface); }
.month-btn { background: none; border: none; padding: 7px 13px; cursor: pointer; font-size: 13px; color: var(--text-primary); font-family: inherit; transition: background 0.12s; }
.month-btn:hover { background: var(--bg); }
.month-display { font-size: 13px; font-weight: 500; padding: 7px 14px; min-width: 130px; text-align: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
.today-btn { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 12px; color: var(--text-secondary); font-family: inherit; transition: background 0.12s; }
.today-btn:hover { background: var(--bg); }
.refresh-btn { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 12px; color: var(--text-secondary); font-family: inherit; transition: background 0.12s; display: flex; align-items: center; gap: 5px; }
.refresh-btn:hover { background: var(--bg); }
.refresh-btn.loading { opacity: 0.5; pointer-events: none; }

/* 로딩 상태 */
.loading-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 14px; overflow: hidden; display: none; }
.loading-bar.show { display: block; }
.loading-bar-inner { height: 100%; width: 30%; background: #1a73e8; border-radius: 2px; animation: slide 1.2s infinite ease-in-out; }
@keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }

.sync-status { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; min-height: 16px; }
.sync-status.ok { color: #2d7a4a; }
.sync-status.err { color: #c0392b; }

.legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-bottom: 14px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; min-width: 600px; }
thead th { background: var(--header-bg); color: var(--header-text); font-weight: 400; font-size: 11px; padding: 8px 6px; text-align: center; border-right: 1px solid rgba(255,255,255,0.07); white-space: nowrap; }
thead th.room-col { text-align: left; padding-left: 14px; min-width: 155px; font-size: 12px; }
thead th.today-col { background: #383838; }
thead th.sat-col { color: #88aaff; }
thead th.sun-col { color: #ff9090; }
tr.month-row th { font-size: 10px; font-weight: 500; letter-spacing: 0.4px; background: #2c2c2c; color: rgba(255,255,255,0.55); padding: 5px 6px; border-right: 1px solid rgba(255,255,255,0.05); }
tr.month-row th.month-label-cell { color: rgba(255,255,255,0.85); }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td.date-cell:not(.booked-cell) { background: #faf9f6 !important; }
td { padding: 0; border-right: 1px solid var(--border); vertical-align: middle; height: 44px; }
td:last-child { border-right: none; }
td.room-name { padding: 0 10px 0 14px; font-size: 11px; font-weight: 400; color: var(--text-muted); white-space: nowrap; background: var(--surface); position: sticky; left: 0; z-index: 2; border-right: 2px solid var(--border-strong); }
.room-type-label { font-size: 15px; font-weight: 600; color: var(--text-primary); display: block; }
td.date-cell { text-align: center; }
td.date-cell.is-today { background: #f3f2ee; }
td.date-cell.is-weekend { background: #fafaf8; }
.cell-dot { display: flex; align-items: center; justify-content: center; height: 44px; font-size: 11px; font-weight: 600; }
.summary-bar { margin-top: 10px; font-size: 11px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; }
.summary-val { font-weight: 500; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">제주 오션스위츠 객실 예약현황</div>
    <div class="page-sub" id="todayLabel"></div>
  </div>
  <div class="controls">
    <button class="today-btn" onclick="goToday()">오늘로</button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">🔄 새로고침</button>
    <div class="month-nav">
      <button class="month-btn" onclick="moveRange(-1)">◀</button>
      <div class="month-display" id="rangeLabel"></div>
      <button class="month-btn" onclick="moveRange(1)">▶</button>
    </div>
  </div>
</div>

<div class="loading-bar" id="loadingBar"><div class="loading-bar-inner"></div></div>
<div class="sync-status" id="syncStatus"></div>
<div class="legend" id="legend"></div>

<div class="table-wrap">
  <table id="mainTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<div class="summary-bar" id="summaryBar"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxfsIg5eDIwn-b3eDDHxWjL9T8VjlxAhY2iGgc1WJThG9hHW2zi5RqMfOzTqc01VuXA/exec';

const ROOMS = [
  { key:'스탠다드 9평, 2인, 트윈, 별장1',   short:'2인, 트윈, 별장1',      type:'스탠다드 9평',    bg:'#c8dff7', text:'#1a3a5c' },
  { key:'스탠다드 9평, 2인, 트윈, 별장2',   short:'2인, 트윈, 별장2',      type:'스탠다드 9평',    bg:'#b8ead4', text:'#134d31' },
  { key:'스탠다드 9평, 2인, 트윈, 수익1',   short:'2인, 트윈, 수익1',      type:'스탠다드 9평',    bg:'#fde8c8', text:'#5c3500' },
  { key:'디럭스 15평, 2인/최대3',            short:'2인/최대3, 더블, 수익',     type:'디럭스 15평',     bg:'#c8f0ee', text:'#0a3d3d' },
  { key:'투룸패밀리 14평, 4인, 트윈, 별장1',short:'4인, 트윈, 별장1',      type:'투룸패밀리 14평', bg:'#dfd8f7', text:'#2d1f6b' },
  { key:'투룸패밀리 14평, 4인, 트윈, 수익1',short:'4인, 트윈, 수익1',      type:'투룸패밀리 14평', bg:'#fcd9e0', text:'#5c1028' },
  { key:'투룸패밀리 14평, 4인, 트윈, 수익2',short:'4인, 트윈, 수익2',      type:'투룸패밀리 14평', bg:'#fce4d4', text:'#5c2200' },
  { key:'투룸패밀리 14평, 4인, 더블, 수익1',short:'4인, 더블, 수익', type:'투룸패밀리 14평', bg:'#f2d6f5', text:'#4a0a4a' },
  { key:'코너스위트 19평, 4인/최대6',        short:'4인/최대6, 더블, 수익', type:'코너스위트 19평', bg:'#fffbc4', text:'#4a4200' },
];
const ROOM_MAP = {};
ROOMS.forEach(r => ROOM_MAP[r.key] = r);

let bookings = [];
const today = new Date(); today.setHours(0,0,0,0);
const DAYS_SHOW = 62;
let viewOffset = 0;

function dateStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }

function getViewDays(){ const start=addDays(today,viewOffset); const days=[]; for(let i=0;i<DAYS_SHOW;i++) days.push(addDays(start,i)); return days; }

function buildBookingSet(){
  const ts=dateStr(today); const set={};
  bookings.forEach(b=>{
    if(!b.checkout||b.checkout<=ts) return;
    const r=ROOM_MAP[b.room]; if(!r) return;
    let d=new Date(b.checkin);
    const co=new Date(b.checkout);
    while(d<co){ const ds=dateStr(d); if(ds>=ts) set[b.room+'|'+ds]={bg:r.bg,text:r.text}; d=addDays(d,1); }
  });
  return set;
}

function renderLegend(){
  const ts=dateStr(today);
  const used=new Set(bookings.filter(b=>b.checkout>ts).map(b=>b.room));
  const leg=document.getElementById('legend'); leg.innerHTML='';
  ROOMS.forEach(r=>{ if(!used.has(r.key)) return; const div=document.createElement('div'); div.className='leg'; div.innerHTML=`<div class="leg-dot" style="background:${r.bg};border:1px solid ${r.text}33"></div><span>${r.type} · ${r.short}</span>`; leg.appendChild(div); });
}

function renderTable(){
  const days=getViewDays(); const booked=buildBookingSet(); const ts=dateStr(today); const last=days[days.length-1];
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('rangeLabel').textContent=`${fmt(days[0])} — ${fmt(last)}`;
  const DOW=['일','월','화','수','목','금','토'];
  document.getElementById('todayLabel').textContent=`오늘: ${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${DOW[today.getDay()]}) 기준`;
  const monthSpans=[]; let cur=null;
  days.forEach(d=>{ const key=d.getFullYear()+'-'+(d.getMonth()+1); if(!cur||cur.key!==key){ cur={key,label:`${d.getFullYear()}년 ${d.getMonth()+1}월`,count:1}; monthSpans.push(cur); } else cur.count++; });
  const thead=document.getElementById('tableHead'); thead.innerHTML='';
  const mRow=document.createElement('tr'); mRow.className='month-row';
  mRow.appendChild(Object.assign(document.createElement('th'),{className:'room-col'}));
  monthSpans.forEach(ms=>{ const th=document.createElement('th'); th.colSpan=ms.count; th.className='month-label-cell'; th.textContent=ms.label; mRow.appendChild(th); });
  thead.appendChild(mRow);
  const dRow=document.createElement('tr');
  const dTh0=document.createElement('th'); dTh0.className='room-col'; dTh0.textContent='객실'; dRow.appendChild(dTh0);
  days.forEach(d=>{ const th=document.createElement('th'); th.textContent=d.getDate(); const ds=dateStr(d); const dow=d.getDay(); if(ds===ts) th.classList.add('today-col'); if(dow===6) th.classList.add('sat-col'); if(dow===0) th.classList.add('sun-col'); dRow.appendChild(th); });
  thead.appendChild(dRow);
  const wRow=document.createElement('tr');
  wRow.appendChild(Object.assign(document.createElement('th'),{className:'room-col'}));
  days.forEach(d=>{ const th=document.createElement('th'); th.textContent=DOW[d.getDay()]; th.style.fontSize='10px'; const dow=d.getDay(); th.style.color=dow===0?'#ff9090':dow===6?'#88aaff':'rgba(255,255,255,0.38)'; wRow.appendChild(th); });
  thead.appendChild(wRow);
  const tbody=document.getElementById('tableBody'); tbody.innerHTML=''; let totalBooked=0;
  ROOMS.forEach(room=>{
    const tr=document.createElement('tr');
    const td0=document.createElement('td'); td0.className='room-name';
    td0.innerHTML=`<span class="room-type-label">${room.type}</span><span>${room.short}</span>`;
    tr.appendChild(td0);
    days.forEach(d=>{ const ds=dateStr(d); const isBooked=!!(booked[room.key+'|'+ds]); const dow=d.getDay(); const td=document.createElement('td'); td.className='date-cell'; if(ds===ts) td.classList.add('is-today'); if(dow===0||dow===6) td.classList.add('is-weekend'); if(isBooked){ td.classList.add('booked-cell'); td.style.background=room.bg; const dot=document.createElement('div'); dot.className='cell-dot'; dot.style.color=room.text; dot.textContent='●'; td.appendChild(dot); totalBooked++; } tr.appendChild(td); });
    tbody.appendChild(tr);
  });
  const tf=bookings.filter(b=>b.checkout>ts);
  document.getElementById('summaryBar').innerHTML=`<span>표시 기간: <span class="summary-val">오늘부터 ${DAYS_SHOW}일</span></span><span>예약 건수: <span class="summary-val">${tf.length}건</span></span><span>점유: <span class="summary-val">${totalBooked}셀</span></span>`;
}

function renderAll(){ renderLegend(); renderTable(); }
function moveRange(dir){ viewOffset+=dir*7; renderAll(); }
function goToday(){ viewOffset=0; renderAll(); }

function loadData(){
  const lb=document.getElementById('loadingBar');
  const st=document.getElementById('syncStatus');
  const rb=document.getElementById('refreshBtn');
  lb.classList.add('show');
  rb.classList.add('loading');
  st.textContent='구글 시트에서 데이터 불러오는 중...';
  st.className='sync-status';

  fetch(API_URL)
    .then(r=>r.json())
    .then(data=>{
      if(data.error){ throw new Error(data.error); }
      const ts=dateStr(today);
      bookings=data.filter(b=>b.checkout>ts);
      lb.classList.remove('show');
      rb.classList.remove('loading');
      const now=new Date();
      st.textContent=`✅ ${bookings.length}건 반영 완료 · 마지막 업데이트: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
      st.className='sync-status ok';
      renderAll();
    })
    .catch(err=>{
      lb.classList.remove('show');
      rb.classList.remove('loading');
      st.textContent=`❌ 불러오기 실패: ${err.message}`;
      st.className='sync-status err';
    });
}

// 페이지 열릴 때 자동 로드
loadData();

// 5분마다 자동 갱신
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
